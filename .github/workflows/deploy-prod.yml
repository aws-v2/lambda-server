name: Prod Deployment

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/lambda-server:prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Prod via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create aws-prod-network || true
            docker pull qarani/lambda-server:prod
            docker stop lambda-server-prod || true
            docker rm lambda-server-prod || true
            docker run -d \
              --name lambda-server-prod \
              --network aws-prod-network \
              -p 8089:8089 \
              -e APP_PROFILE=prod \
              -e DB_HOST=postgres-prod \
              -e DB_PORT=5432 \
              -e DB_USER=postgres-prod-user \
              -e DB_PASSWORD=postgres-prod-password \
              -e DB_NAME=lambda_db \
              -e DB_SSLMODE=require \
              -e NATS_URL=nats://nats-prod:4222 \
              -e NATS_USER=nats-prod-user \
              -e NATS_PASSWORD=nats-prod-password \
              -e INSTANCE_TOKEN_SECRET=${{ secrets.INSTANCE_TOKEN_SECRET }} \
              -e HTTP_PORT=8089 \
              -e EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
              -e EUREKA_APP_NAME=LAMBDA-SERVER \
              -e EUREKA_HOSTNAME=lambda-server-prod \
              -e EUREKA_IP_ADDR=lambda-server-prod \
              -e EUREKA_VIP_ADDRESS=lambda-server \
              -e EUREKA_INSTANCE_ID=lambda-server:8089 \
              -e EUREKA_HEARTBEAT_INTERVAL=30s \
              qarani/lambda-server:prod




