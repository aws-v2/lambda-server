name: Staging Deployment

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub.
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/lambda-service:staging

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker network create aws-staging-network || true
            docker pull qarani/lambda-service:staging
            docker stop lambda-service-staging || true
            docker rm lambda-service-staging || true
            docker run -d --name lambda-service-staging \
              --network aws-staging-network \
              -p 8089:8089 \
              -e APP_PROFILE=staging \
              -e DB_HOST=postgres-staging \
              -e DB_PORT=5432 \
              -e DB_USER=postgres-staging-user \
              -e DB_PASSWORD=postgres-staging-password \
              -e DB_NAME=lambda_db \
              -e NATS_URL=nats://nats-staging:4222 \
              -e NATS_USER=nats-staging-user \
              -e NATS_PASSWORD=nats-staging-password \
              -e EUREKA_HOSTNAME=lambda-service-staging \
              -e EUREKA_IP_ADDR= 127.0.0.1\
              -e EUREKA_SERVER_URL=http://discovery-server-staging:8761/eureka \
              -e SERVICE_NAME=lambda-service \
              -e AWS_REGION=eu-north-1 \
              -e PORT=8089 \
              qarani/lambda-service:staging
