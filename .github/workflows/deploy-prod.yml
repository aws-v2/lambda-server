name: Production Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/lambda-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Production via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create aws-prod-network || true
            docker pull qarani/lambda-service:latest
            docker stop lambda-service-prod || true
            docker rm lambda-service-prod || true
            docker run -d --name lambda-service-prod \
              --network aws-prod-network \
              -p 8089:8089 \
              -e APP_PROFILE=prod \
              -e DB_HOST=postgres-prod \
              -e DB_PORT=5432 \
              -e DB_USER=lambda-server \
              -e DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
              -e DB_NAME=lambda_db \
              -e NATS_URL=nats://nats-prod:4222 \
              -e NATS_USER=lambda-server \
              -e NATS_PASSWORD=${{ secrets.PROD_NATS_PASSWORD }} \
              -e EUREKA_SERVER_URL=http://eureka-prod:8761/eureka \
              -e SERVICE_NAME=lambda-service \
              -e AWS_REGION=eu-north-1 \
              -e PORT=8089 \
              qarani/lambda-service:latest